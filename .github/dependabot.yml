version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@stylistic/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "globals"
        update-types: ["patch"]
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
        update-types: ["minor", "patch"]
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types: ["patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
