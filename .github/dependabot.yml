version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@stylistic/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "globals"
        update-types: ["patch"]
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
        update-types: ["patch"]
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types: ["patch"]
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
        update-types: ["patch"]
      runtime-dependencies:
        dependency-type: production
        patterns:
          - "openai"
          - "@qdrant/js-client-rest"
          - "uuid"
          - "undici"
          - "zod"
          - "dotenv"
          - "@pawells/logger"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
