name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0ad4c9a3629326bcc8a5a7bda12e16da52f39ba7 # v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          HUSKY: '0'

      - name: Type check
        run: yarn typecheck

      - name: Lint
        run: yarn lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@0ad4c9a3629326bcc8a5a7bda12e16da52f39ba7 # v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          HUSKY: '0'

      - name: Test
        run: yarn test:coverage
        env:
          HUSKY: '0'
          OPENAI_API_KEY: 'test-ci-key'

  build:
    name: Build
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0ad4c9a3629326bcc8a5a7bda12e16da52f39ba7 # v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          HUSKY: '0'

      - name: Build
        run: yarn build
