name: Publish

on:
  push:
    branches: ['development/[0-9]*.[0-9]*']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      prerelease_type:
        description: 'Pre-release type'
        required: false
        type: choice
        options:
          - stable
          - dev
          - alpha
          - beta
          - rc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          HUSKY: '0'

      - name: Build
        run: yarn build
        env:
          HUSKY: '0'

      - name: Determine version and tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            if [[ "$VERSION" =~ - ]]; then
              DIST_TAG="${VERSION##*-}"
              DIST_TAG="${DIST_TAG%%.*}"
              IS_PRERELEASE=true
            else
              DIST_TAG="latest"
              IS_PRERELEASE=false
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/heads/development/* ]]; then
            BRANCH="${{ github.ref_name }}"
            VERSION="${BRANCH#development/}"
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA:0:7}"
            VERSION="${VERSION}.0-dev.${SHORT_SHA}"
            DIST_TAG="dev"
            IS_PRERELEASE=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PRERELEASE="${{ inputs.prerelease_type }}"
            if [[ "$PRERELEASE" == "stable" ]]; then
              VERSION="$(node -e "console.log(require('./package.json').version)")"
              DIST_TAG="latest"
              IS_PRERELEASE=false
            else
              VERSION="$(node -e "console.log(require('./package.json').version)")-${PRERELEASE}.$(date +%s)"
              DIST_TAG="$PRERELEASE"
              IS_PRERELEASE=true
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: yarn npm publish --provenance --access public --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ steps.version.outputs.is_prerelease == 'false' }}
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
